<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisador de numero</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Analisador de Numero</h1>
    </header>
    <section>

        <div class="container_numb">
            <h3>Insira um numero(Entre 1 e 100):</h3>
            <input type="number" id="numb">
            <input type="button" value="Adicionar" id="numb_btn" onclick="numb_btn()">
        </div>

            <br><select name="lista" id="list" size="10px"></select>
            <br><input type="button" value="Verificar" id="btn" onclick="verif_btn()">

        <div class="result">
            <p class="p1"></p>
            <p class="p2"></p>
            <p class="p3"></p>
            <p class="p4"></p>
            <p class="p5"></p>
        </div>

    </section>

    <footer>
        <h3>JavaScript - DrwaxP&copy;</h3>
            <p>Repositorio do GitHub</p>

    </footer>
    
    <script src="./main.js"></script>
</body>
</html>
